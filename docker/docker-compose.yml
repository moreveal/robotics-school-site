services:

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    command: sh -c "python manage.py compilemessages && python manage.py runserver 0.0.0.0:8000"

  tailwind:
    image: node:20
    working_dir: /app
    volumes:
      - ..:/app
      - /app/node_modules
    command: sh -c "npm install && npx @tailwindcss/cli -i ./static/css/app.css -o ./static/css/style.css --watch"
