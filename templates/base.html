{% load static i18n %}

<!doctype html>
<html lang="{{ LANGUAGE_CODE }}" x-data="theme()" :class="{ 'dark': dark }">
  <head>
    <script>
      (function () {
        const stored = localStorage.getItem("theme");

        if (
          stored === "dark" ||
          (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{% block title %} {{ SITE_NAME }} {% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x"></script>

    <script>
      function theme() {
        return {
          dark: document.documentElement.classList.contains("dark"),

          toggle() {
            this.dark = !this.dark;

            if (this.dark) {
              document.documentElement.classList.add("dark");
              localStorage.setItem("theme", "dark");
            } else {
              document.documentElement.classList.remove("dark");
              localStorage.setItem("theme", "light");
            }
          },
        };
      }
    </script>
  </head>

  <body
    x-data="theme()"
    class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100"
  >
    <header class="border-b bg-white dark:bg-gray-950 dark:border-gray-800">
      <div
        class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between"
      >
        <a href="/" class="font-bold text-lg"> {{ SITE_NAME }} </a>

        <nav class="hidden md:flex gap-6 text-sm">
          <a href="/">{% trans "Avaleht" %}</a>
          <a href="/courses">{% trans "Kursused" %}</a>
          <a href="/news">{% trans "Uudised" %}</a>
          <a href="/contact">{% trans "Kontakt" %}</a>
        </nav>

        <div class="flex items-center gap-4">
          <!-- language -->

          <div class="flex gap-2 text-sm">
            <a href="/et{{ request.path|slice:'3:' }}">ET</a>
            <a href="/ru{{ request.path|slice:'3:' }}">RU</a>
          </div>

          <!-- theme -->

          <button
            @click="toggle"
            class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 cursor-pointer"
          >
            <!-- moon -->

            <svg
              x-show="!dark"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.752 15.002A9 9 0 1112.998 2.25 7.5 7.5 0 0021.75 15z"
              />
            </svg>

            <!-- sun -->

            <svg
              x-show="dark"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v1.5M12 19.5V21M4.22 4.22l1.06 1.06M18.72 18.72l1.06 1.06M3 12h1.5M19.5 12H21M4.22 19.78l1.06-1.06M18.72 5.28l1.06-1.06M12 7.5A4.5 4.5 0 1112 16.5 4.5 4.5 0 0112 7.5z"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- content -->
    <main class="flex-1">{% block content %} {% endblock %}</main>

    <!-- footer -->
    <footer
      class="border-t mt-20 bg-white dark:bg-gray-950 dark:border-gray-800"
    >
      <div
        class="max-w-7xl mx-auto px-6 py-10 text-sm text-gray-500 flex justify-between"
      >
        <p>© {{ SITE_NAME }} {% now "Y" %}</p>

        <p>{% trans "Robootika õpe lastele" %}</p>
      </div>
    </footer>
  </body>
</html>
